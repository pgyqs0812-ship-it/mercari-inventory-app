name: Build Mercari App

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow dmgbuild

      - name: Build app
        run: |
          chmod +x build_mac.sh
          VERSION="${{ github.ref_name }}" ./build_mac.sh

      # ── Optional: Developer ID signing + notarization ──────────────────────
      # This step runs only when the APPLE_CERTIFICATE_BASE64 secret is present.
      # To enable, add the repository secrets listed in SIGNING.md:
      #   APPLE_CERTIFICATE_BASE64     — base64-encoded .p12 certificate
      #   APPLE_CERTIFICATE_PASSWORD   — .p12 export password
      #   APPLE_SIGN_IDENTITY          — "Developer ID Application: Name (TEAMID)"
      #   APPLE_TEAM_ID                — 10-char Apple Team ID
      #   APPLE_API_KEY_BASE64         — base64-encoded .p8 App Store Connect API key
      #   APPLE_API_KEY_ID             — API key ID (10 chars)
      #   APPLE_API_ISSUER_ID          — API issuer ID (UUID)
      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          echo "${APPLE_CERTIFICATE_BASE64}" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: Sign app bundle
        if: env.APPLE_SIGN_IDENTITY != ''
        run: |
          APP="dist/MIAInventory.app"
          codesign --sign "${APPLE_SIGN_IDENTITY}" --force --options runtime \
            --deep --entitlements entitlements.plist "${APP}"
          echo "✓ .app signed"

      - name: Notarize app
        if: env.APPLE_API_KEY_BASE64 != ''
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "${APPLE_API_KEY_BASE64}" | base64 --decode -o "${KEY_PATH}"
          ditto -c -k --keepParent dist/MIAInventory.app notarize_submit.zip
          xcrun notarytool submit notarize_submit.zip \
            --key "${KEY_PATH}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple dist/MIAInventory.app
          rm -f notarize_submit.zip "${KEY_PATH}"
          echo "✓ .app notarized and stapled"

      # ── DMG creation (after notarization so the .app inside is fully signed) ──
      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          DMG_NAME="MIAInventory_Mac_${VERSION}.dmg"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"
          # dmg_background.png was generated by build_mac.sh above
          dmgbuild \
            -s dmgbuild_settings.py \
            -D app_path="dist/MIAInventory.app" \
            -D bg_path="dmg_background.png" \
            "MIAInventory ${{ github.ref_name }}" \
            "dist/${DMG_NAME}"
          echo "✓ DMG: dist/${DMG_NAME}"
          # Validation gate: verify volume name matches release version
          EXPECTED_VOLUME="MIAInventory ${VERSION}"
          MOUNT_OUT=$(hdiutil attach "dist/${DMG_NAME}" -nobrowse -noverify -noautoopen 2>&1)
          MOUNT_POINT=$(echo "${MOUNT_OUT}" | tail -1 | awk '{print $NF}')
          VOLUME_NAME=$(basename "${MOUNT_POINT}")
          hdiutil detach "${MOUNT_POINT}" -quiet 2>/dev/null || true
          if [ "${VOLUME_NAME}" != "${EXPECTED_VOLUME}" ]; then
            echo "ERROR: Volume name mismatch — got '${VOLUME_NAME}', expected '${EXPECTED_VOLUME}'"
            exit 1
          fi
          echo "✓ Version validation passed: volume '${VOLUME_NAME}'"

      - name: Sign DMG
        if: env.APPLE_SIGN_IDENTITY != ''
        run: |
          codesign --sign "${APPLE_SIGN_IDENTITY}" --force "dist/${DMG_NAME}"
          echo "✓ DMG signed"

      - name: Zip dist
        run: |
          ditto -c -k --keepParent dist/MIAInventory.app dist.zip

      - name: Generate QR code for release download URL
        run: |
          pip install "qrcode[pil]"
          python - <<'PYEOF'
          import qrcode
          url = "https://github.com/pgyqs0812-ship-it/mercari-inventory-app/releases/download/${{ github.ref_name }}/dist.zip"
          img = qrcode.make(url)
          img.save("download-qr.png")
          print(f"QR code generated for: {url}")
          PYEOF

      # ── Jira issue creation (MUST succeed before release is published) ──────
      # Requires four repository secrets:
      #   JIRA_URL            https://yoursite.atlassian.net
      #   JIRA_EMAIL          your@email.com
      #   JIRA_API_TOKEN      Atlassian API token (https://id.atlassian.com/manage-profile/security/api-tokens)
      #   JIRA_PROJECT_KEY    KAN
      # If any secret is missing or the API call fails, this step exits non-zero
      # and the "Upload release assets" step is skipped — the release is blocked.
      # The issue key is written to GITHUB_OUTPUT and used by the close step below.
      - name: Create Jira issue
        id: create_jira
        env:
          JIRA_URL:         ${{ secrets.JIRA_URL }}
          JIRA_EMAIL:       ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:   ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: |
          pip install requests python-dotenv
          python create_jira_ticket.py \
            --version "${{ github.ref_name }}" \
            --summary "${{ github.ref_name }} — $(git log -1 --pretty=%s)" \
            --release-url "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist.zip
            download-qr.png
            dist/${{ env.DMG_NAME }}

      # ── Jira issue close (runs after release upload succeeds) ────────────
      # Transitions the issue created above to Done and adds a release comment.
      # Fails loudly (exit 1) if the transition or comment call fails.
      - name: Close Jira issue
        if: steps.create_jira.outputs.issue_key != ''
        env:
          JIRA_URL:         ${{ secrets.JIRA_URL }}
          JIRA_EMAIL:       ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:   ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: |
          python create_jira_ticket.py \
            --done "${{ steps.create_jira.outputs.issue_key }}" \
            --version "${{ github.ref_name }}" \
            --release-url "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            --artifact "${DMG_NAME}" \
            --artifact "dist.zip" \
            --artifact "download-qr.png"
