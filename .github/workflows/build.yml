name: Build Mercari App

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: |
          chmod +x build_mac.sh
          ./build_mac.sh

      - name: Zip dist
        run: |
          zip -r dist.zip dist/

      - name: Generate QR code for release download URL
        run: |
          pip install "qrcode[pil]"
          python - <<'PYEOF'
          import qrcode
          url = "https://github.com/pgyqs0812-ship-it/mercari-inventory-app/releases/download/${{ github.ref_name }}/dist.zip"
          img = qrcode.make(url)
          img.save("download-qr.png")
          print(f"QR code generated for: {url}")
          PYEOF

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist.zip
            download-qr.png